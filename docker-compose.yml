services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/meowindex
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SCRAPE_API_KEY=${SCRAPE_API_KEY}
      - SCRAPER_MODEL=${SCRAPER_MODEL:-gemini-2.5-flash}
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: meowindex
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
